<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel</title>
    <style>
        :root {
            --bg-a: #f3efe7;
            --bg-b: #cfe0e4;
            --ink: #12212a;
            --plate: #ffffff;
            --line: #d6e0e5;
            --spin: #0d7286;
            --spin-hover: #095b6b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 12%, #ffffffad 0%, transparent 28%),
                radial-gradient(circle at 88% 85%, #bdd9df 0%, transparent 34%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b));
        }

        .stage {
            width: min(94vw, 680px);
            padding: 18px;
            border-radius: 24px;
            border: 1px solid var(--line);
            background: var(--plate);
            box-shadow: 0 20px 44px rgba(13, 39, 51, 0.14);
            display: grid;
            place-items: center;
            position: relative;
        }

        .pointer {
            position: absolute;
            top: 12px;
            width: 0;
            height: 0;
            border-left: 17px solid transparent;
            border-right: 17px solid transparent;
            border-top: 32px solid #131a22;
            z-index: 3;
            filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.25));
        }

        #wheelCanvas {
            width: min(86vmin, 560px);
            height: min(86vmin, 560px);
            transform: rotate(0deg);
            transition: transform 4.9s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
            background: #f9fbfc;
        }

        #spinBtn {
            position: absolute;
            z-index: 4;
            width: 112px;
            height: 112px;
            border: 0;
            border-radius: 50%;
            background: var(--spin);
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 0.06em;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(9, 91, 107, 0.34);
            transition: transform 140ms ease, background 140ms ease;
        }

        #spinBtn:hover {
            transform: scale(1.02);
            background: var(--spin-hover);
        }

        #spinBtn:active {
            transform: scale(0.98);
        }

        #spinBtn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .status {
            margin-top: 12px;
            min-height: 24px;
            font-weight: 700;
            color: #35434b;
        }
    </style>
</head>

<body>
    <main class="stage" aria-label="Spinning wheel">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheelCanvas" width="560" height="560"></canvas>
        <button id="spinBtn" type="button">SPIN</button>
    </main>
    <p id="status" class="status" aria-live="polite"></p>

    <script src="wheel.js"></script>
</body>

</html>
